name: taski
description: "A beautiful daily task manager for Windows and Web."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0
  bitsdojo_window: ^0.1.6
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  provider: ^6.1.1
  intl: ^0.19.0
  fl_chart: ^0.67.0
  flutter_local_notifications: ^17.2.4
  google_fonts: ^6.2.1
  window_manager: ^0.3.8
  reorderables: ^0.6.0
  flutter_animate: ^4.5.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  shared_preferences: ^2.3.2
  fuzzy: ^0.5.1
  package_info_plus: ^6.0.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/stickers/
